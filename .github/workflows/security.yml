name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Chaque dimanche à 02:00
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔒 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔐 Audit npm packages
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 🚨 Check for critical vulnerabilities
        run: npm audit --json > audit.json; cat audit.json
        continue-on-error: true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for TruffleHog

      - name: 👀 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --json
        continue-on-error: true  # Don't fail on base=head errors

  env-check:
    name: Environment Variables Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for exposed secrets
        run: |
          # Don't exit on error, we'll handle errors explicitly
          set +e
          
          echo "🔍 Checking for exposed secrets..."
          
          # Check if .env files are in tracked files (should be empty)
          ENV_FILES=$(git ls-files --others --cached --exclude-standard | grep -E "\.env($|\.)" | grep -v ".env.example" || true)
          if [ -n "$ENV_FILES" ]; then
            echo "❌ ERROR: .env files found in tracked files:"
            echo "$ENV_FILES"
            exit 1
          fi
          
          # Check if Firebase config is tracked (should NOT be)
          FIREBASE_FILES=$(git ls-files --others --cached --exclude-standard | grep "firebase-applet-config.json" || true)
          if [ -n "$FIREBASE_FILES" ]; then
            echo "❌ ERROR: Firebase config file is tracked (should be in .gitignore):"
            echo "$FIREBASE_FILES"
            exit 1
          fi
          
          # Verify .gitignore has the rules
          if ! grep -q "firebase-applet-config.json" .gitignore 2>/dev/null; then
            echo "❌ ERROR: firebase-applet-config.json not in .gitignore"
            exit 1
          fi
          
          if ! grep -q "\.env" .gitignore 2>/dev/null; then
            echo "❌ ERROR: .env* patterns not in .gitignore"
            exit 1
          fi
          
          echo "✅ All secret checks passed - no sensitive files are tracked"
          exit 0
