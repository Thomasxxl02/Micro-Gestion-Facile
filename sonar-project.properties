sonar.projectKey=Thomasxxl02_Micro-Gestion-Facile
sonar.projectName=Micro-Gestion-Facile
sonar.projectVersion=0.0.0
sonar.organization=thomasxxl02

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=node_modules/**,dist/**,.git/**,.github/**,coverage/**,__tests__/**/*.test.tsx,__tests__/**/*.test.ts

# Test files
sonar.test.inclusions=**/*.{test,spec}.{ts,tsx}
sonar.tests=.

# Coverage
sonar.javascript.lcov.reportPaths=./coverage/lcov.info

# TypeScript support
sonar.typescript.tsconfigPath=./tsconfig.json

# Code smells, bugs, and security hotspots
sonar.qualitygate.wait=true
