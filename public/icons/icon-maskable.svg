<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Zone sûre maskable = cercle centré 40% ~205px rayon -->
  <!-- Contenu positionné dans la zone centrale (128..384) -->
  <defs>
    <linearGradient id="bgMask" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fond plein (maskable = fond couvre tout le carré) -->
  <rect width="512" height="512" rx="0" fill="url(#bgMask)"/>
  <!-- Contenu centré dans la zone sûre (marges ~20%) -->
  <rect x="134" y="304" width="60" height="112" rx="10" fill="white" fill-opacity="0.85"/>
  <rect x="226" y="236" width="60" height="180" rx="10" fill="white"/>
  <rect x="318" y="176" width="60" height="240" rx="10" fill="white" fill-opacity="0.85"/>
  <!-- Ligne de tendance -->
  <polyline
    points="164,296 256,228 348,168"
    fill="none"
    stroke="white"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.6"
  />
</svg>
