# Nginx configuration for PWA (React SPA + Service Worker)
server {
    listen 8080;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;

    root /usr/share/nginx/html;

    # Service Worker - Always served fresh, no cache
    location = /sw.js {
        try_files $uri $uri/ =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate, public";
        add_header Pragma "no-cache";
        add_header Access-Control-Allow-Origin "*";
        types { application/javascript js; }
        default_type application/javascript;
    }

    # Manifest - Always served fresh, short cache
    location = /manifest.webmanifest {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }

    # Static assets (JS, CSS, images) - Long cache with versioning
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML files - Short cache, always validate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Root and SPA routing - Always route to index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}
