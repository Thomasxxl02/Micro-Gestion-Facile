name: Build & Test 🚀

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job 1: Validate secrets and setup
  validate:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.check.outputs.status }}
    steps:
      - name: 🔍 Validate required secrets
        id: check
        run: |
          echo "🔍 Validating required environment variables..."
          MISSING_SECRETS=()

          [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_PROJECT_ID")
          [ -z "${{ secrets.VITE_FIREBASE_APP_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_APP_ID")
          [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_API_KEY")
          [ -z "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_AUTH_DOMAIN")

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            echo "status=warning" >> $GITHUB_OUTPUT
          else
            echo "✅ All required secrets configured"
            echo "status=success" >> $GITHUB_OUTPUT
          fi

  # Job 2: Build & Test
  build:
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      matrix:
        node-version: [22.x]

    env:
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 TypeScript type-checking
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run unit tests
        run: npm run test
        continue-on-error: true

      - name: 📊 Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: 📈 Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: 🏗️ Build application
        run: npm run build

      - name: 📊 Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"

      - name: 🚀 Archive build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 7

  # Job 3: Deploy to Staging
  deploy-staging:
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: 🚀 Deploy to Staging
        run: echo "Deploy to staging - configure your deployment script"

  # Job 4: Deploy to Production
  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - name: 🚀 Deploy to Production
        run: echo "Deploy to production - configure your deployment script"
