name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    # Centralize environment variables at job level
    env:
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: � Validate required secrets
        run: |
          echo "🔍 Validating required environment variables..."
          MISSING_SECRETS=()

          # Check Firebase secrets
          [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_PROJECT_ID")
          [ -z "${{ secrets.VITE_FIREBASE_APP_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_APP_ID")
          [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_API_KEY")
          [ -z "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_AUTH_DOMAIN")
          [ -z "${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_FIRESTORE_DATABASE_ID")
          [ -z "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_STORAGE_BUCKET")
          [ -z "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_MESSAGING_SENDER_ID")
          [ -z "${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}" ] && MISSING_SECRETS+=("VITE_FIREBASE_MEASUREMENT_ID")
          [ -z "${{ secrets.GEMINI_API_KEY }}" ] && MISSING_SECRETS+=("GEMINI_API_KEY")

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets:"
            printf '  - %s\n' "${MISSING_SECRETS[@]}"
            echo ""
            echo "ℹ️ Configure these secrets in: Settings > Secrets and variables > Actions"
            exit 1
          fi

          echo "✅ All required secrets are configured"

      - name: �📥 Checkout code
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Check TypeScript types
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: 📈 Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: 🏗️ Build application
        run: npm run build

      - name: 📊 Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not created"
            exit 1
          fi

      - name: ✨ Run ESLint & Prettier
        run: npm run lint --fix
        continue-on-error: true

      - name: 🚀 Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 5
