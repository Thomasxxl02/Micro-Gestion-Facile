name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Chaque dimanche à 02:00
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔒 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔐 Audit npm packages
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 🚨 Check for critical vulnerabilities
        run: npm audit --json > audit.json; cat audit.json
        continue-on-error: true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for TruffleHog

      - name: 👀 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified --json
        continue-on-error: true # Don't fail on base=head errors

  env-check:
    name: Environment Variables Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for exposed secrets
        run: |
          echo "🔍 Checking for exposed secrets..."
          PASS=true

          # Get all tracked files
          TRACKED_FILES=$(git ls-files)

          # Check if any .env files are tracked (except .env.example)
          if echo "$TRACKED_FILES" | grep -E "\.env($|\.)" | grep -v ".env.example"; then
            echo "❌ ERROR: .env files are tracked in git"
            PASS=false
          fi

          # Check if Firebase config file is tracked
          if echo "$TRACKED_FILES" | grep -q "firebase-applet-config.json"; then
            echo "❌ ERROR: firebase-applet-config.json is tracked - should be in .gitignore"
            PASS=false
          fi

          # Verify .gitignore exists and has required rules
          if [ ! -f ".gitignore" ]; then
            echo "❌ ERROR: .gitignore file not found"
            PASS=false
          else
            if ! grep -q "firebase-applet-config.json" .gitignore; then
              echo "❌ ERROR: firebase-applet-config.json not in .gitignore"
              PASS=false
            fi
            if ! grep -q "\.env" .gitignore; then
              echo "❌ ERROR: .env patterns not in .gitignore"
              PASS=false
            fi
          fi

          # Final result
          if [ "$PASS" = true ]; then
            echo "✅ All secret checks passed"
            exit 0
          else
            echo "❌ Secret checks failed"
            exit 1
          fi
