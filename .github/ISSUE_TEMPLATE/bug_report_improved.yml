---
name: Better Bug Report 🐛
description: Report a bug with detailed information
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler ce bug ! Remplissez les détails ci-dessous.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Description du bug
      description: Décrivez le bug de manière claire et concise
      placeholder: "Qu'est-il passé ?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: ⚡ Étapes à reproduire
      description: Comment reproduire ce bug ?
      placeholder: |
        1. Allez à '...'
        2. Cliquez sur '...'
        3. Entrez '...'
        4. Observez l'erreur '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 🎯 Comportement attendu
      description: Que devrait-il se passer au lieu du bug ?
      placeholder: "Décrivez le comportement attendu"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🖥️ Contexte d'exécution
      description: Informations sur votre environnement
      placeholder: |
        - OS: Windows / macOS / Linux
        - Navigateur: Chrome / Firefox / Safari / Edge
        - Version: 1.0.0
        - Mode: PWA / Web / Desktop

  - type: textarea
    id: logs
    attributes:
      label: 📋 Logs/Erreurs
      description: Collez les erreurs de console si applicable
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Screenshots/Vidéo
      description: Joignez les captures d'écran ou vidéos montrant le bug

  - type: checkboxes
    id: impact
    attributes:
      label: 🔍 Impact
      options:
        - label: Le bug a-t-il des implications de sécurité ?
        - label: Est-ce un problème de performance ?
        - label: Cela affecte la fiscalité/calculs ?

  - type: dropdown
    id: severity
    attributes:
      label: 🏷️ Sévérité
      description: Comment classeriez-vous ce bug ?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📊 Fréquence
      description: À quelle fréquence ce bug se produit-il ?
      options:
        - Always
        - Sometimes
        - Rarely
    validations:
      required: true

  - type: dropdown
    id: reproducible
    attributes:
      label: 🔄 Reproductible
      options:
        - "Yes"
        - "No"
        - Unknown
    validations:
      required: true
