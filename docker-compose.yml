# =============================================================================
# Stack VPS — Traefik v3 + Next.js + PostgreSQL + Redis + Ollama
# =============================================================================
# Prérequis :
#   1. Créer le réseau externe : docker network create traefik-public
#   2. Copier .env.example → .env et remplir les valeurs
#   3. Générer le hash bcrypt pour TRAEFIK_DASHBOARD_AUTH :
#        echo $(htpasswd -nB admin) | sed -e 's/\$/\$\$/g'
# Déploiement :
#   docker compose pull && docker compose up -d
# =============================================================================

name: vps-stack

services:

  # ---------------------------------------------------------------------------
  # TRAEFIK — Reverse proxy + TLS automatique Let's Encrypt
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Socket Docker en lecture seule (least privilege)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    command:
      # API / Dashboard (accessible via label ci-dessous)
      - --api.dashboard=true
      - --log.level=WARN

      # Entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.certResolver=letsencrypt

      # Let's Encrypt (TLS Challenge — port 443 doit être accessible)
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true

      # Provider Docker
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik-public

    labels:
      - "traefik.enable=true"
      # Dashboard — accessible sur traefik.votre-domaine.com (auth basic obligatoire)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth,secure-headers"
      # Basic auth — générer avec : echo $(htpasswd -nB admin) | sed -e 's/\$/\$\$/g'
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      # Middleware headers de sécurité (réutilisé par tous les services)
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.secure-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"

    networks:
      - traefik-public

  # ---------------------------------------------------------------------------
  # NEXT.JS — Application principale (port interne 3000)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.nextjs         # Adaptez selon votre Dockerfile
      target: runner                         # Stage multi-stage (si applicable)
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-my-org/my-app}:${IMAGE_TAG:-latest}
    container_name: nextjs-app
    restart: unless-stopped
    # Ne pas exposer le port directement (Traefik est le seul point d'entrée)
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Base de données
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      # Cache
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # NextAuth (si utilisé)
      NEXTAUTH_URL: https://${DOMAIN}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Ollama — URL interne (réseau internal uniquement)
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
      - "traefik.http.routers.app.middlewares=secure-headers,www-redirect"
      # Redirection www → apex
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.${DOMAIN}/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://${DOMAIN}/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
    networks:
      - traefik-public
      - internal

  # ---------------------------------------------------------------------------
  # POSTGRESQL 17 — Base de données relationnelle
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optionnel : scripts d'init SQL
      # - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Postgres n'est accessible que depuis le réseau interne
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # REDIS 7 — Cache / sessions / queues (persistance AOF)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # OLLAMA — Moteur LLM local (CPU par défaut, GPU optionnel)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    # ---- GPU Nvidia (décommenter si disponible) ----
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # ---- GPU AMD ROCm (décommenter si disponible) ----
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # Ollama REST uniquement accessible en interne (pas exposé publiquement)
    networks:
      - internal
    # Pull automatique d'un modèle au démarrage (optionnel)
    # entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"]

  # ---------------------------------------------------------------------------
  # OPEN WEBUI — Interface web pour Ollama (optionnel)
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      # Désactiver l'enregistrement public si usage privé
      ENABLE_SIGNUP: "false"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.open-webui.entrypoints=websecure"
      - "traefik.http.routers.open-webui.tls.certresolver=letsencrypt"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"
      - "traefik.http.routers.open-webui.middlewares=secure-headers"
    networks:
      - traefik-public
      - internal

# =============================================================================
# VOLUMES — Persistance des données
# =============================================================================
volumes:
  traefik-certs:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  ollama-models:
    driver: local
  open-webui-data:
    driver: local

# =============================================================================
# RÉSEAUX
# =============================================================================
networks:
  # Réseau externe partagé entre stacks Traefik (créer avec: docker network create traefik-public)
  traefik-public:
    external: true
  # Réseau interne isolé — les services DB/Redis/Ollama ne sont pas accessibles depuis l'extérieur
  internal:
    driver: bridge
    internal: true
