<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Barres de graphique (icône comptabilité) -->
  <rect x="88"  y="304" width="88" height="152" rx="14" fill="white" fill-opacity="0.85"/>
  <rect x="212" y="212" width="88" height="244" rx="14" fill="white"/>
  <rect x="336" y="136" width="88" height="320" rx="14" fill="white" fill-opacity="0.85"/>
  <!-- Ligne de tendance -->
  <polyline
    points="132,296 256,204 380,128"
    fill="none"
    stroke="white"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.6"
  />
  <!-- Signe euro en filigrane -->
  <text
    x="72" y="188"
    font-family="Arial,Helvetica,sans-serif"
    font-size="120"
    font-weight="700"
    fill="white"
    fill-opacity="0.15"
  >€</text>
</svg>
