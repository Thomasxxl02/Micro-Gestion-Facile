---
name: Documentation Issue 📚
description: Report missing or unclear documentation
labels: [documentation, good first issue]
body:
  - type: markdown
    attributes:
      value: |
        Aidez-nous à améliorer la documentation !

  - type: checkboxes
    id: section
    attributes:
      label: 📚 Section concernée
      description: Quelle partie de la documentation nécessite une amélioration ?
      options:
        - label: Guide d'installation
        - label: Architecture
        - label: Contributing
        - label: API Reference
        - label: Test Coverage
        - label: Security
        - label: Autre

  - type: input
    id: title
    attributes:
      label: 🏷️ Titre
      description: Titre du problème de documentation
      placeholder: "Ex: Guide d'installation incomplet"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🔍 Problème identifié
      description: Décrivez le problème ou ce qui manque dans la documentation
      placeholder: "La documentation ne couvre pas..."
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 🔗 Lien vers la documentation
      description: Lien vers la page/fichier en question
      placeholder: "https://github.com/...docs/ARCHITECTURE.md"

  - type: textarea
    id: suggestion
    attributes:
      label: 💡 Suggestion
      description: Quelle amélioration proposez-vous ?
      placeholder: "Je pense que nous devrions ajouter..."
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: 📝 Exemple
      description: Fournissez un exemple de ce que vous aimeriez voir (code, explications, etc.)
      placeholder: "Exemple ou draft de la documentation améliorée"
