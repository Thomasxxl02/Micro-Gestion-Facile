name: Code Quality & Analysis 📊

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 ESLint analysis
        run: npm run lint --max-warnings=0
        continue-on-error: true

      - name: ✨ Prettier check
        run: npm run format --check
        continue-on-error: true

      - name: 📈 Complexity analysis
        run: npm run complexity
        continue-on-error: true

  # Accessibility checks
  a11y:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Build for a11y analysis
        run: npm run build
        continue-on-error: true

  # Performance analysis
  performance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build
        run: npm run build

      - name: 📊 Analyze bundle
        run: npm run build:analyze
        continue-on-error: true

      - name: 💾 Bundle size check
        run: npm run bundlesize
        continue-on-error: true
