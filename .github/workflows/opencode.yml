name: OpenCode Analysis 🛡️

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  opencode-scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛡️ OpenCode Security Scan
        run: |
          # Simulation de l'intégration OpenCode via Curl (basé sur la demande utilisateur)
          # Note: En production, remplacez par l'action GitHub officielle si disponible
          curl -fsSL https://opencode.ai/install | bash
          opencode scan --path . --format sarif --output opencode-results.sarif
        continue-on-error: true

      - name: 📊 Upload analysis results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: opencode-results.sarif
        if: success() || failure()
