name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Chaque dimanche à 02:00
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔒 Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔐 Audit npm packages
        run: npm audit --audit-level=moderate --legacy-peer-deps
        continue-on-error: true

      - name: 🚨 Check for critical vulnerabilities
        run: npm audit --json > audit.json; cat audit.json
        continue-on-error: true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for secret detection

      - name: 👀 Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: 🔒 Validate npm dependencies
        run: npm audit --audit-level=moderate --legacy-peer-deps || true
        continue-on-error: true

  env-check:
    name: Environment Variables Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for exposed secrets in version control
        run: |
          echo "🔍 Checking for exposed secrets..."
          PASS=true

          # Get all tracked files
          TRACKED_FILES=$(git ls-files)

          # Check if any .env files are tracked (except .env.example)
          if echo "$TRACKED_FILES" | grep -E "\.env($|\.)" | grep -v ".env.example"; then
            echo "❌ ERROR: .env files are tracked in git"
            PASS=false
          fi

          # Check if Firebase config file is tracked
          if echo "$TRACKED_FILES" | grep -q "firebase-applet-config.json"; then
            echo "❌ ERROR: firebase-applet-config.json is tracked - should be in .gitignore"
            PASS=false
          fi

          # Verify .gitignore exists and has required rules
          if [ ! -f ".gitignore" ]; then
            echo "❌ ERROR: .gitignore file not found"
            PASS=false
          else
            if ! grep -q "firebase-applet-config.json" .gitignore; then
              echo "❌ ERROR: firebase-applet-config.json not in .gitignore"
              PASS=false
            fi
            if ! grep -q "\.env" .gitignore; then
              echo "❌ ERROR: .env patterns not in .gitignore"
              PASS=false
            fi
          fi

          # Final result
          if [ "$PASS" = true ]; then
            echo "✅ All secret exposure checks passed"
            exit 0
          else
            echo "❌ Secret exposure checks failed"
            exit 1
          fi

      - name: 📋 Document Required Secrets
        run: |
          echo "📋 **Repository Secrets Configuration Guide**" > /tmp/secrets-check.md
          echo "" >> /tmp/secrets-check.md
          echo "**Required Firebase Secrets:**" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_PROJECT_ID" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_APP_ID" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_API_KEY" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_AUTH_DOMAIN" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_FIRESTORE_DATABASE_ID" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_STORAGE_BUCKET" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_MESSAGING_SENDER_ID" >> /tmp/secrets-check.md
          echo "- VITE_FIREBASE_MEASUREMENT_ID" >> /tmp/secrets-check.md
          echo "" >> /tmp/secrets-check.md
          echo "**Required API Keys:**" >> /tmp/secrets-check.md
          echo "- GEMINI_API_KEY" >> /tmp/secrets-check.md
          echo "" >> /tmp/secrets-check.md
          echo "**Configure at:** Settings > Secrets and variables > Actions" >> /tmp/secrets-check.md
          cat /tmp/secrets-check.md
