<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <title>Hors ligne – Micro Gestion Facile</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --indigo: #4f46e5;
        --violet: #7c3aed;
        --slate-50: #f8fafc;
        --slate-200: #e2e8f0;
        --slate-500: #64748b;
        --slate-900: #0f172a;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: var(--slate-50);
        color: var(--slate-900);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card {
        background: white;
        border-radius: 1.5rem;
        padding: 3rem 2.5rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.07),
          0 10px 40px -10px rgb(79 70 229 / 0.15);
        border: 1px solid var(--slate-200);
      }

      .icon-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      .icon-wrapper svg {
        width: 40px;
        height: 40px;
        color: var(--indigo);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        background: linear-gradient(135deg, var(--indigo), var(--violet));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        color: var(--slate-500);
        line-height: 1.6;
        margin-bottom: 2rem;
        font-size: 0.9375rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: linear-gradient(135deg, var(--indigo), var(--violet));
        color: white;
        font-size: 0.9375rem;
        font-weight: 600;
        padding: 0.75rem 1.75rem;
        border-radius: 0.75rem;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.15s;
      }

      .btn:hover {
        opacity: 0.9;
      }

      .info {
        margin-top: 1.5rem;
        font-size: 0.8125rem;
        color: var(--slate-500);
        padding-top: 1.5rem;
        border-top: 1px solid var(--slate-200);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon-wrapper">
        <!-- Icône Wi-Fi barré -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z"
          />
          <line x1="3" y1="3" x2="21" y2="21" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>

      <h1>Connexion indisponible</h1>

      <p>
        Vous êtes actuellement hors ligne. Vos données locales restent accessibles —
        reconnectez-vous pour synchroniser avec le cloud.
      </p>

      <button class="btn" onclick="window.location.reload()">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99"
          />
        </svg>
        Réessayer
      </button>

      <p class="info">Micro Gestion Facile · données stockées localement sur votre appareil</p>
    </div>
  </body>
</html>
