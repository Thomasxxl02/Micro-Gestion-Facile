name: Security Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Chaque dimanche à 02:00
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript']

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔒 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔐 Audit npm packages
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: 🚨 Check for critical vulnerabilities
        run: npm audit --json > audit.json; cat audit.json
        continue-on-error: true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 👀 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  env-check:
    name: Environment Variables Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔎 Check for exposed secrets
        run: |
          # Check if .env files are committed
          if git log --all --pretty=format: --name-only | grep -E "\.env($|\.)" | grep -v ".env.example"; then
            echo "⚠️ Warning: .env files detected in history"
            exit 1
          fi
          
          # Check Firebase config
          if grep -r "firebase-applet-config.json" .gitignore >/dev/null; then
            echo "✅ Firebase config properly ignored"
          else
            echo "❌ Firebase config NOT properly ignored"
            exit 1
          fi
