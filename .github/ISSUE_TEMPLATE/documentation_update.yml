name: 📝 Documentation Update
description: Signaler un besoin de mise à jour de documentation ou de traduction
title: '[DOC] - '
labels: documentation
body:
  - type: markdown
    attributes:
      value: |
        Merci de nous aider à améliorer la documentation de Micro-Gestion-Facile !
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Expliquez ce qui doit être mis à jour ou ajouté.
      placeholder: "ex: La documentation de l'export Factur-X n'est plus à jour..."
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: Contenu suggéré
      description: Si vous avez déjà une idée du contenu à ajouter, mettez-le ici.
  - type: checkboxes
    id: checklist
    attributes:
      label: Type de documentation
      options:
        - label: Documentation utilisateur
        - label: Documentation technique (API, Architecture)
        - label: Traduction (FR/EN)
        - label: README / CONTRIBUTING
